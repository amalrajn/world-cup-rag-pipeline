services:
  - type: web
    name: world-cup-rag-pipeline
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      # Set the actual value in the Render dashboard (Environment > Secret).
      # sync: false keeps the secret out of this file / the git repo.
      - key: GOOGLE_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.10.14"
